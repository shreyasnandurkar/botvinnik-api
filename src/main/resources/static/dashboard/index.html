<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BotvinnikAPI — dashboard</title>
<style>
  :root {
    --bg: #0e1116; --surface: #161b22; --border: #262d38;
    --ink: #e6e9ee; --ink-2: #9aa4b2; --ink-3: #5f6a78;
    --good: #3fb96b; --warn: #d9a03f; --bad: #e05d5d; --accent: #5b9dd9;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--ink);
    font: 14px/1.5 ui-sans-serif, system-ui, "Segoe UI", sans-serif;
    padding: 20px 24px 48px;
  }
  header { display: flex; align-items: baseline; gap: 14px; margin-bottom: 18px; flex-wrap: wrap; }
  header h1 { font-size: 18px; font-weight: 650; letter-spacing: .2px; }
  header .sub { color: var(--ink-3); font-size: 12.5px; }
  header .right { margin-left: auto; display: flex; align-items: center; gap: 10px; color: var(--ink-3); font-size: 12.5px; }
  select {
    background: var(--surface); color: var(--ink); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 8px; font: inherit; font-size: 12.5px;
  }
  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 14px; }
  .tile { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
  .tile .label { color: var(--ink-2); font-size: 11.5px; text-transform: uppercase; letter-spacing: .6px; }
  .tile .value { font-size: 24px; font-weight: 650; font-variant-numeric: tabular-nums; margin-top: 2px; }
  .tile .unit { color: var(--ink-3); font-size: 13px; font-weight: 400; margin-left: 3px; }
  .grid { display: grid; grid-template-columns: 3fr 2fr; gap: 14px; }
  @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 14px; overflow-x: auto; }
  .panel h2 { font-size: 12.5px; color: var(--ink-2); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 10px; }
  table { border-collapse: collapse; width: 100%; font-variant-numeric: tabular-nums; }
  th { text-align: left; color: var(--ink-3); font-size: 11.5px; font-weight: 500; text-transform: uppercase; letter-spacing: .5px; padding: 4px 12px 6px 0; border-bottom: 1px solid var(--border); }
  td { padding: 6px 12px 6px 0; border-bottom: 1px solid var(--border); color: var(--ink); white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  td.num, th.num { text-align: right; padding-right: 0; padding-left: 12px; }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 1px 9px 1px 7px; border-radius: 999px; font-size: 12px; font-weight: 600; border: 1px solid; }
  .pill::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .pill.HEALTHY { color: var(--good); border-color: color-mix(in srgb, var(--good) 40%, transparent); }
  .pill.DEGRADED { color: var(--warn); border-color: color-mix(in srgb, var(--warn) 40%, transparent); }
  .pill.OPEN, .pill.DOWN { color: var(--bad); border-color: color-mix(in srgb, var(--bad) 40%, transparent); }
  .muted { color: var(--ink-3); }
  .mono { font-family: ui-monospace, Consolas, monospace; font-size: 12.5px; }
  .trend-up { color: var(--warn); } .trend-down { color: var(--good); }
  .route { padding: 6px 0; border-bottom: 1px solid var(--border); }
  .route:last-child { border-bottom: none; }
  .route .arrow { color: var(--ink-3); padding: 0 6px; }
  .err { color: var(--bad); }
  .empty { color: var(--ink-3); padding: 8px 0; }
</style>
</head>
<body>
<header>
  <h1>BotvinnikAPI</h1>
  <span class="sub">read-only ops view — config changes go through the REST API</span>
  <span class="right">
    <label>window <select id="window">
      <option value="15">15 min</option><option value="60">1 h</option><option value="1440">24 h</option>
    </select></label>
    <span id="updated">—</span>
  </span>
</header>

<div class="tiles" id="tiles"></div>

<div class="grid">
  <div>
    <div class="panel"><h2>Providers</h2><div id="providers" class="empty">loading…</div></div>
    <div class="panel"><h2>Recent failures</h2><div id="failures" class="empty">loading…</div></div>
  </div>
  <div>
    <div class="panel"><h2>Routing — alias → provider/model</h2><div id="routing" class="empty">loading…</div></div>
    <div class="panel"><h2>Pools</h2><div id="pools" class="empty">loading…</div></div>
    <div class="panel"><h2>Spend — per key / provider / model</h2><div id="usage" class="empty">loading…</div></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const ms = v => v == null ? "—" : Math.round(v).toLocaleString();
const num = v => v == null ? "—" : Number(v).toLocaleString();
const usd = v => v == null ? "—" : "$" + Number(v).toFixed(4);

async function fetchJson(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(url + " → " + res.status);
  return res.json();
}

function tile(label, value, unit) {
  return `<div class="tile"><div class="label">${label}</div>
          <div class="value">${value}${unit ? `<span class="unit">${unit}</span>` : ""}</div></div>`;
}

function renderStats(s) {
  $("tiles").innerHTML =
    tile("Requests", num(s.requests)) +
    tile("Req / min", num(s.requests_per_min)) +
    tile("Error rate", (s.error_rate * 100).toFixed(1), "%") +
    tile("TTFT p50", ms(s.ttft_p50_ms), "ms") +
    tile("TTFT p95", ms(s.ttft_p95_ms), "ms") +
    tile("TTFT p99", ms(s.ttft_p99_ms), "ms");
}

function trend(ewma, baseline) {
  if (ewma == null || baseline == null) return "";
  if (ewma > 1.5 * baseline) return ` <span class="trend-up">▲</span>`;
  if (ewma < 0.75 * baseline) return ` <span class="trend-down">▼</span>`;
  return ` <span class="muted">→</span>`;
}

function renderHealth(health) {
  const names = Object.keys(health);
  if (!names.length) { $("providers").innerHTML = `<div class="empty">no active providers</div>`; return; }
  $("providers").innerHTML = `<table>
    <tr><th>Provider</th><th>Status</th><th>Circuit</th><th class="num">In flight</th>
        <th class="num">TTFT ewma</th><th class="num">Baseline</th><th class="num">Ping</th></tr>
    ${names.map(n => { const h = health[n]; return `<tr>
      <td class="mono">${esc(n)}</td>
      <td><span class="pill ${esc(h.status)}">${esc(h.status)}</span></td>
      <td class="muted">${esc(h.circuit)}</td>
      <td class="num">${num(h.in_flight)}</td>
      <td class="num">${ms(h.ttft_ewma_ms)} ms${trend(h.ttft_ewma_ms, h.ttft_baseline_ms)}</td>
      <td class="num muted">${ms(h.ttft_baseline_ms)} ms</td>
      <td class="num muted">${ms(h.ping_ms)} ms</td></tr>`; }).join("")}
  </table>`;
}

function renderRouting(aliases) {
  $("routing").innerHTML = aliases.length ? aliases.map(a => `<div class="route mono">
      ${esc(a.alias)}<span class="arrow">→</span>${esc(a.primary)}
      ${(a.fallbacks || []).map(f => `<span class="arrow">↳</span><span class="muted">${esc(f)}</span>`).join("")}
    </div>`).join("") : `<div class="empty">no aliases defined</div>`;
}

function renderPools(pools) {
  $("pools").innerHTML = pools.length ? `<table>
    <tr><th>Pool</th><th>Strategy</th><th>Members</th></tr>
    ${pools.map(p => `<tr><td class="mono">${esc(p.name)}</td><td class="muted">${esc(p.strategy)}</td>
      <td class="mono">${p.members.map(esc).join(", ")}</td></tr>`).join("")}
  </table>` : `<div class="empty">no pools defined</div>`;
}

function renderUsage(rows) {
  $("usage").innerHTML = rows.length ? `<table>
    <tr><th>Key</th><th>Provider</th><th>Model</th><th class="num">Reqs</th>
        <th class="num">Tokens in/out</th><th class="num">Cost</th></tr>
    ${rows.map(r => `<tr>
      <td class="mono">${esc(r.api_key ?? "—")}</td><td class="mono">${esc(r.provider ?? "—")}</td>
      <td class="mono">${esc(r.model ?? "—")}</td><td class="num">${num(r.requests)}</td>
      <td class="num muted">${num(r.prompt_tokens)} / ${num(r.completion_tokens)}</td>
      <td class="num">${usd(r.cost_usd)}</td></tr>`).join("")}
  </table>` : `<div class="empty">no traffic yet</div>`;
}

function renderFailures(logs) {
  const failures = logs.filter(l => l.outcome !== "success").slice(0, 10);
  $("failures").innerHTML = failures.length ? `<table>
    <tr><th>Time</th><th>Provider</th><th>Model</th><th>Outcome</th><th>Error code</th></tr>
    ${failures.map(l => `<tr>
      <td class="muted">${new Date(l.ts).toLocaleTimeString()}</td>
      <td class="mono">${esc(l.provider ?? "—")}</td><td class="mono">${esc(l.model ?? "—")}</td>
      <td class="err">${esc(l.outcome)}</td><td class="mono">${esc(l.error_code ?? "—")}</td></tr>`).join("")}
  </table>` : `<div class="empty">no failures in the last 100 requests</div>`;
}

async function refresh() {
  const windowMinutes = $("window").value;
  const results = await Promise.allSettled([
    fetchJson(`/v1/stats?window_minutes=${windowMinutes}`).then(renderStats),
    fetchJson("/v1/health").then(renderHealth),
    fetchJson("/v1/aliases").then(renderRouting),
    fetchJson("/v1/pools").then(renderPools),
    fetchJson("/v1/usage").then(renderUsage),
    fetchJson("/v1/logs?limit=100").then(renderFailures),
  ]);
  const failed = results.filter(r => r.status === "rejected");
  $("updated").textContent = failed.length
    ? "partial refresh — " + new Date().toLocaleTimeString()
    : "updated " + new Date().toLocaleTimeString();
}

refresh();
setInterval(refresh, 4000);
$("window").addEventListener("change", refresh);
</script>
</body>
</html>
