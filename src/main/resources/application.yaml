server:
  port: 4000

spring:
  application:
    name: botvinnikAPI
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:botvinnik}
    username: ${DB_USER:botvinnik}
    password: ${DB_PASSWORD:botvinnik}
  flyway:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:botvinnik}
    user: ${DB_USER:botvinnik}
    password: ${DB_PASSWORD:botvinnik}

botvinnik:
  providers:
    - name: local-ollama
      type: ollama
      base-url: http://localhost:11434
    - name: google
      type: gemini
      api-key: ${GEMINI_API_KEY}